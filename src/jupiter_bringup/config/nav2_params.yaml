#
# Nav2 configuration for Jupiter — 4-wheel mecanum robot
# Vision-only stack: cuVSLAM localisation + nvblox costmaps (no LiDAR)
#
# Aligned with NVIDIA Isaac ROS nvblox reference (carter_nav2.yaml, release-4.4)
# Key differences from reference: Omni motion model, smaller inflation for narrower
# home corridors, higher transform_tolerance for 6fps RGBD TF updates.

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 100
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    default_nav_to_pose_bt_xml: "/home/jupiter/jupitercpp_ws/src/jupiter_bringup/config/navigate_to_pose_omni.xml"
    default_nav_through_poses_bt_xml: "/home/jupiter/jupitercpp_ws/src/jupiter_bringup/config/navigate_through_poses_omni.xml"
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    transform_tolerance: 0.5
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 3.14
      stateful: true

    FollowPath:
      # 2026-06-11: switched MPPI -> RPP. MPPI's stochastic path-OPTIMISATION freelanced in the open
      # lounge (erratic spins/back-pedals) and cut corners into furniture. RPP is a deterministic path-
      # TRACKER: it locks onto the global planner's centreline, PIVOTS IN PLACE to line up with a doorway
      # before driving through, and regulates speed near obstacles. Right fit for a structured apartment
      # (0.8m doorways, 1.2m passages) on a no-strafe (vy=0) but pivot-capable mecanum base.
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.30               # cruise speed on straights
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      # Lookahead "carrot" -- keep short so it squares up before a doorway instead of clipping the frame.
      use_velocity_scaled_lookahead_dist: true
      lookahead_dist: 0.50
      min_lookahead_dist: 0.40                # 2026-06-12: 0.30->0.40
      max_lookahead_dist: 0.90                # 2026-06-12: 0.60->0.90
      lookahead_time: 2.0                      # 2026-06-12: 1.5->2.0. Effective carrot = vel*time = 0.30*2.0 = 0.60m
                                               # (was 0.45m). A LONGER carrot averages out SmacPlanner2D path wiggle so
                                               # the heading-to-carrot error stays small/steady -> RPP TRACKS instead of
                                               # toggling across the rotate-to-heading threshold (the left/right "dance").
      # Pivot-in-place to face the path before driving (mecanum zero-radius turn; the behaviour you want).
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 1.0         # 2026-06-12: 0.785->1.0 (~57deg). Only PIVOT for genuinely large heading
                                               # errors (e.g. squaring up to a doorway), NOT minor path wiggle. Stops the
                                               # in-place spin from re-triggering every cycle and swinging the footprint
                                               # into the inflated passage walls (which caused the "collision ahead" spam).
      rotate_to_heading_angular_vel: 1.0
      max_angular_accel: 3.2
      allow_reversing: false                 # rotate-to-heading handles turns (mutually exclusive with reversing)
      # Regulated velocity: auto-slow on tight curvature and near obstacle cost (dining/kitchen clutter).
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.90
      regulated_linear_scaling_min_speed: 0.15
      use_cost_regulated_linear_velocity_scaling: true
      inflation_cost_scaling_factor: 5.0     # MUST match the costmap inflation cost_scaling_factor (5.0)
      cost_scaling_dist: 0.6
      cost_scaling_gain: 1.0
      # Look ahead for collisions along the carrot before committing.
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      transform_tolerance: 0.5
      max_robot_pose_search_dist: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      transform_tolerance: 0.5
      footprint: "[[-0.175, -0.20], [0.175, -0.20], [0.175, 0.20], [-0.175, 0.20]]"
      plugins: ["obstacle_layer", "nvblox_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 7.5
          obstacle_min_range: 0.0
        decay_time: 5.0
      # nvblox_layer — Orbbec depth -> GPU ESDF slice. Catches LOW furniture (chairs, table
      # legs, feet) that the S2E lidar at 0.515 m is blind to. 2026-06-10.
      nvblox_layer:
        plugin: "nvblox::nav2::NvbloxCostmapLayer"
        enabled: true    # re-enabled 2026-06-10 after shrinking nvblox map_clearing_radius 5.0->2.5 to stop phantom accumulation
        nvblox_map_slice_topic: "/nvblox_node/static_map_slice"
        max_obstacle_distance: 1.0
        inflation_distance: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # CONSERVATIVE-FIRST (2026-06-09): start at 0.45 — well above the 0.266 m circumscribed
        # radius — so the robot is OVER-cautious and refuses tight gaps rather than crashing.
        # Expect it to freeze at narrow doorways; that PROVES the stop reflex works. Then reduce
        # inflation_radius one step at a time (0.45 -> 0.40 -> 0.35 ...) until it just fits the
        # doors. This is the single tuning dial; leave everything else fixed while turning it.
        cost_scaling_factor: 5.0   # 2026-06-11 (RPP switch): steep decay -> clean low-cost VALLEY down doorway/passage centres
        inflation_radius: 0.55     # 2026-06-11: 0.8m door = 0.2m clearance/side; 0.55 + steep 5.0 keeps centre low-cost + passable
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      footprint: "[[-0.175, -0.20], [0.175, -0.20], [0.175, 0.20], [-0.175, 0.20]]"
      resolution: 0.05
      track_unknown_space: true
      width: 40
      height: 40
      origin_x: -20.0
      origin_y: -20.0
      transform_tolerance: 0.5
      # static_layer stamps the pre-built apartment map into the GLOBAL costmap so the
      # planner routes around real walls (it was missing — planner saw only live lidar +
      # unknown space and cut diagonals straight through walls/furniture). 2026-06-09.
      plugins: ["static_layer", "obstacle_layer", "nvblox_layer", "inflation_layer"]   # 2026-06-12: nvblox RE-ADDED to global -- lab clutter is below the lidar; Smac needs it to route around real low furniture
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 7.5
          obstacle_min_range: 0.0
        decay_time: 10.0
      # nvblox_layer RE-ADDED to GLOBAL 2026-06-12: the lab clutter is LOW (below the 0.515m lidar), so the
      # lidar-only global costmap was BLIND to it -> Smac planned the robot STRAIGHT INTO real furniture (only the
      # LOCAL costmap saw it, where RPP then collision-stopped + trapped). With nvblox in the GLOBAL costmap, Smac
      # sees the low clutter and routes AROUND it through the real free space. Marks are REAL (Logan confirmed).
      nvblox_layer:
        plugin: "nvblox::nav2::NvbloxCostmapLayer"
        enabled: true
        nvblox_map_slice_topic: "/nvblox_node/static_map_slice"
        max_obstacle_distance: 1.0
        inflation_distance: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # CONSERVATIVE-FIRST (2026-06-09): start at 0.45 — well above the 0.266 m circumscribed
        # radius — so the robot is OVER-cautious and refuses tight gaps rather than crashing.
        # Expect it to freeze at narrow doorways; that PROVES the stop reflex works. Then reduce
        # inflation_radius one step at a time (0.45 -> 0.40 -> 0.35 ...) until it just fits the
        # doors. This is the single tuning dial; leave everything else fixed while turning it.
        cost_scaling_factor: 5.0   # 2026-06-11 (RPP switch): steep decay carves a clean centre valley
        inflation_radius: 0.55     # 2026-06-11: with steep cost_scaling 5.0, centres of 0.8m doors / 1.2m passages stay
                                   # low-cost + passable. (NOT last session's 0.70 + gentle-2.0 that trapped the robot.)
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      # 2026-06-12: NavFn -> SmacPlanner2D. Cost-aware A* -> routes the low-cost CENTRE valley of passages/doorways
      # (with the 0.55/5.0 inflation) instead of hugging corners; produces smoother paths for RPP to track.
      # SmacPlanner2D, NOT Hybrid -- Hybrid-A* is for car-like/Ackermann; we pivot in place, so 2D is correct.
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.25                    # match the controller goal_checker (0.25). Kept > Gemini's 0.12 -- too tight
                                         # risks "failed to plan" when a goal sits near furniture/walls.
      allow_unknown: true                # kept true (Gemini suggested false). false = won't route through ANY unknown
                                         # cell -> safer in a fully-mapped home, but risks plan failure on map gaps.
                                         # Flip to false once we confirm the apartment map has no holes.
      downsample_costmap: false
      downsampling_factor: 1
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      motion_model_for_search: "MOORE"   # 8-connected -> smoother diagonal paths
      cost_travel_multiplier: 4.0        # 2026-06-12 (Gemini): high value FORCES the path to the CENTRE of doorways/passages
                                         # ("rather walk a bit further down the middle than shortcut near walls"). Default ~2.0.
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    # Spin and backup disabled for Omni mecanum — spin fails on cluttered costmaps,
    # backup drives blindly in -X regardless of obstacles (caused bar stool collision).
    behavior_plugins: ["drive_on_heading", "assisted_teleop", "wait"]
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # y (strafe) clamped to 0.0 — diff-drive behaviour, belt-and-suspenders with the
    # controller's vy_max:0.0 so no lateral command can reach the motors.
    max_velocity: [0.3, 0.0, 0.8]
    min_velocity: [-0.25, 0.0, -0.8]
    max_accel: [2.5, 2.5, 3.2]
    max_decel: [-2.5, -2.5, -3.2]
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ── Localization: static map + AMCL ──────────────────────────────────────────
# Added 2026-06-09 for the S2E + static-map nav stack (replaces cuVSLAM map->odom).
# AMCL localizes the S2E /scan against the pre-built apartment map and publishes map->odom.
map_server:
  ros__parameters:
    use_sim_time: false
    # yaml_filename is supplied by navigation_s2e.launch.py (default maps/apartment_s2e_v2.yaml)
    topic_name: "map"
    frame_id: "map"

amcl:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "scan"
    robot_model_type: "nav2_amcl::OmniMotionModel"   # mecanum / omnidirectional base
    laser_model_type: "likelihood_field"
    laser_max_range: 18.0
    laser_min_range: 0.15
    max_beams: 120
    min_particles: 500
    max_particles: 3000
    # omni odom-noise model (alpha1..alpha5)
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    update_min_a: 0.1   # 2026-06-10: was 0.15 — correct heading more often
    update_min_d: 0.05  # 2026-06-10: was 0.2 — AMCL ran open-loop on odometry between 0.2m corrections;
                        # the pose slid off the map during the doorway approach (scan drifted right, robot
                        # clipped the jamb). 0.05m = ~4x more frequent scan corrections -> pose stays snapped.
    resample_interval: 1
    transform_tolerance: 1.0
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0
    # likelihood-field measurement model
    z_hit: 0.5
    z_rand: 0.5
    z_short: 0.05
    z_max: 0.05
    sigma_hit: 0.2
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    do_beamskip: false
    pf_err: 0.05
    pf_z: 0.99
    # Bootstrap pose so AMCL publishes map->odom at startup (else planner's global_costmap
    # can't activate — no 'map' frame — and lifecycle bringup aborts). This is just a
    # placeholder at the map origin; correct it with RViz "2D Pose Estimate" once running.
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    always_reset_initial_pose: false
    first_map_only: false
    tf_broadcast: true
    save_pose_rate: 0.5
